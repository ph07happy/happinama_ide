<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>happinama_ide</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="mobile.css">
</head>

<body>

<header>

<div class="logo">
<img src="logo_h.png" alt="Logo" class="header-logo">
<span>IDE</span>
</div>

</header>

<main>

<aside class="sidebar">

<button class="ide-btn square-btn" id="themeBtn" title="Theme">
☾
</button>

<button class="ide-btn square-btn" id="undoBtn" title="Undo">
↶
</button>

<button class="ide-btn square-btn" id="redoBtn" title="Redo">
↷
</button>

<button class="ide-btn square-btn" id="fullscreenBtn" title="Fullscreen">
□
</button>

<button class="ide-btn lang-btn active-lang" id="cBtn">
C
</button>

<button class="ide-btn lang-btn" id="cppBtn">
C++
</button>

<button class="ide-btn lang-btn" id="javaBtn">
Java
</button>

<button class="ide-btn lang-btn" id="pythonBtn">
Py
</button>

<button class="ide-btn square-btn" id="clearScreenBtn" title="Clear Screen">
CLS
</button>

</aside>

<section class="editor-container">

<div class="editor-header">

<div class="file-name" id="fileName">
main.c
</div>

<div class="editor-title">
coding arena
</div>

</div>

<div class="editor-wrapper">

<div id="editor"></div>

<button
id="runBtn"
class="ide-btn execute-btn"
title="Ctrl + Enter to Execute">
Execute
</button>

</div>

</section>

<div id="divider"></div>

<section class="output-container">

<div class="output-header">

<div class="output-title">
Output
</div>

<button
id="clearOutputBtn"
class="ide-btn outline-btn">
Clear
</button>

</div>

<pre id="output">Happy Coding</pre>

</section>

</main>

<footer>

<span id="status">
<b>© 2026 happinama. All rights reserved.</b>
</span>

<img
src="logo_f.png"
alt="Footer Logo"
class="footer-logo">

</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>
<script src="editor.js"></script>
<script src="layout.js"></script>

</body>
</html>
